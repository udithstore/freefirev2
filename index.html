❤️<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UDITH STORE</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
    min-height:100vh;
    color:white;
}

header{
    text-align:center;
    padding:50px 20px;
}

header h1{
    font-size:3rem;
    color:#00d4ff;
}

header p{
    color:#cbd5e1;
    margin-top:10px;
}

.products{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:25px;
    padding:30px;
}

.card{
    width:300px;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.15);
    text-align:center;
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 0 25px rgba(0,212,255,.5);
}

.card img{
    width:100%;
    border-radius:15px;
}

.card h2{
    margin:15px 0 10px;
}

.card p{
    color:#cbd5e1;
    margin-bottom:10px;
}

.price{
    font-size:24px;
    color:#00ff88;
    font-weight:bold;
    margin-bottom:15px;
}

.buy-btn{
    display:inline-block;
    text-decoration:none;
    background:linear-gradient(45deg,#25D366,#00ff88);
    color:white;
    padding:12px 25px;
    border-radius:30px;
    font-weight:bold;
    transition:.3s;
}

.buy-btn:hover{
    transform:scale(1.05);
}

footer{
    text-align:center;
    padding:30px;
    color:#94a3b8;
}
</style>
</head>
<body>

<header>
    <h1>UDITH STORE</h1>
    <p>Free Fire Services & Digital Products</p>
</header>

<section class="products">

    <div class="card">
        <img src="https://via.placeholder.com/300x180" alt="">
        <h2>Free Fire Panel</h2>
        <p>Fast and reliable service.</p>
        <div class="price">Rs. 500</div>
        <a href="https://wa.me/947XXXXXXXX" class="buy-btn">Buy Now</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300x180" alt="">
        <h2>VIP Package</h2>
        <p>Premium gaming package.</p>
        <div class="price">Rs. 1000</div>
        <a href="https://wa.me/947XXXXXXXX" class="buy-btn">Buy Now</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300x180" alt="">
        <h2>Account Service</h2>
        <p>Quick and secure support.</p>
        <div class="price">Rs. 750</div>
        <a href="https://wa.me/947XXXXXXXX" class="buy-btn">Buy Now</a>
    </div>

</section>

<footer>
    © 2026 UDITH STORE. All Rights Reserved.
</footer>

</body>
</html>
